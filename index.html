<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מלך הפעלים</title>

<style>
body {
  margin:0;
  font-family: David, Arial;
  background:#f8fafc;
}

.header {
  background:#0f172a;
  color:#facc15;
  text-align:center;
  padding:15px;
  font-weight:1000;
}

.footer {
  background:#0f172a;
  color:#facc15;
  text-align:center;
  padding:10px;
  position:fixed;
  bottom:0;
  width:100%;
  font-weight:1000;
}

.container {
  padding:20px;
  text-align:center;
}

.card {
  background:white;
  padding:30px;
  border-radius:20px;
  max-width:400px;
  margin:auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input {
  width:100%;
  padding:15px;
  font-size:18px;
  border-radius:15px;
  border:2px solid #ccc;
  margin-top:10px;
  text-align:center;
}

button {
  margin-top:15px;
  padding:15px;
  width:100%;
  border:none;
  border-radius:15px;
  font-size:18px;
  font-weight:1000;
  cursor:pointer;
}

.btn-blue {
  background:#1e3a8a;
  color:white;
}

.logout {
  position:fixed;
  bottom:70px;
  right:10px;
  background:#ef4444;
  color:white;
  padding:10px;
  border-radius:20px;
  display:none;
}

</style>
</head>

<body>

<div class="header">
כל הזכויות שמורות עלי דלאשה 2026
</div>

<div id="app" class="container"></div>

<button id="logoutBtn" class="logout" onclick="logout()">
יציאה
</button>

<div class="footer">
Powered By: Ali Dallasheh Systems 2026
</div>

<script>

const PASSWORD = "DallNet2026";
const STORAGE_KEY = "app_access";

function hasAccess(){
  return localStorage.getItem(STORAGE_KEY)==="yes";
}

function grantAccess(){
  localStorage.setItem(STORAGE_KEY,"yes");
  renderApp();
}

function logout(){
  localStorage.removeItem(STORAGE_KEY);
  renderLogin();
}

function checkPassword(){
  const val = document.getElementById("pass").value;
  if(val === PASSWORD){
    grantAccess();
  } else {
    alert("סיסמה שגויה");
  }
}

function renderLogin(){
  document.getElementById("logoutBtn").style.display="none";

  document.getElementById("app").innerHTML = `
  <div class="card">
    <h2>כניסה למערכת</h2>
    <input id="pass" type="password" placeholder="הקלד סיסמה">
    <button class="btn-blue" onclick="checkPassword()">כניסה</button>
  </div>
  `;
}

function renderApp(){
  document.getElementById("logoutBtn").style.display="block";

  document.getElementById("app").innerHTML = `
  <div class="card">
    <h2>האפליקציה עובדת ✅</h2>
    <p>הגעת למסך הראשי לאחר אימות סיסמה</p>
  </div>
  `;
}

/* INIT */
if(hasAccess()){
  renderApp();
} else {
  renderLogin();
}

</script>

</body>
</html>
