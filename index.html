function escapeHtml(value){return String(value).replace(/[&<>'"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c];});}
function jsArg(value){return String(value).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g," ");}
function fullName(){return (state.user.firstName+" "+state.user.lastName).trim();}
function totalQuestionCount(){return 60;}
function basePercent(){const correct=state.answers.filter(a=>a.isCorrect).length;return Math.round((correct/totalQuestionCount())*100);}
function finalPercent(){return Math.max(0,Math.round(basePercent()-state.hintPenalty));}
function stagePercent(stage){const items=state.answers.filter(a=>a.stage===stage);if(!items.length)return 0;return Math.round((items.filter(a=>a.isCorrect).length/15)*100);}
function answerKey(stage,pronoun,tense){return stage+"_"+pronoun+"_"+tense;}
function correctionKey(originalKey){return "correction_"+originalKey;}
function getAnswer(stage,pronoun,tense){const key=answerKey(stage,pronoun,tense);return state.answers.find(a=>a.key===key);}

function generateDeepInsights(data){const weakest=data.weakestTense,strongest=data.strongestTense,weakPronounsText=data.weakestPronouns.map(x=>x.pronoun+" "+x.percent+" מתוך 100").join("، ");let level="";if(finalPercent()>=90)level="הביצוע שלך מצוין ומראה שליטה גבוהה.";else if(finalPercent()>=75)level="הביצוע שלך טוב מאוד, אך יש צורך בחיזוק ממוקד.";else if(finalPercent()>=60)level="הביצוע שלך בינוני ודורש תרגול מסודר.";else level="יש צורך בתרגול חוזר, איטי ומונחה.";return '<p>'+escapeHtml(fullName())+', '+level+'</p><p>הזמן החזק ביותר הוא <b>'+strongest.label+'</b> עם ציון '+strongest.percent+' מתוך 100.</p><p>הזמן שדורש חיזוק הוא <b>'+weakest.label+'</b> עם ציון '+weakest.percent+' מתוך 100.</p><p>הגופים שדורשים תשומת לב: <b>'+escapeHtml(weakPronounsText)+'</b>.</p><p>מומלץ לעבוד בשלושה צעדים: זיהוי הגוף, זיהוי הזמן, בחירת ההטיה.</p>';}
function generateRecommendations(data){const recs=[],weakest=data.weakestTense;if(weakest.tense==="future")recs.push("לחזק את זמן עתיד באמצעות אותיות איתן: א, י, ת, נ.");if(weakest.tense==="past")recs.push("לחזק את זמן עבר באמצעות סיומות הגוף: תי, ת, ה, נו, תם, תן, ו.");if(weakest.tense==="present")recs.push("לחזק את זמן הווה באמצעות הבחנה בין זכר, נקבה, יחיד ורבים.");recs.push("לבצע את שלב תיקון הטעויות מיד לאחר הניתוח.");recs.push("לקרוא כל אפשרות בקול לפני בחירה.");recs.push("לא להשתמש ברמז מיד, אלא לנסות קודם לבד.");return recs;}
function renderCorrectionLab(){const wrong=state.answers.filter(a=>!a.isCorrect),completed=state.correctionAnswers.length,progress=wrong.length?Math.round((completed/wrong.length)*100):100;app.innerHTML='<section class="card p-4 md:p-6 mt-4"><div class="text-center mb-4"><h2 class="section-title text-3xl md:text-4xl">מעבדת תיקון טעויות</h2></div><p class="text-center font-black text-slate-700 mb-5 text-lg">תיקון הטעויות מתבצע פעם אחת בלבד לכל תא. לאחר בחירה התא ננעל ואין ניסיון נוסף.</p><div class="grid status-grid grid-cols-4 gap-2 mb-4"><div class="status-pill">👤 '+escapeHtml(fullName())+'</div><div class="status-pill">🔎 טעויות לתיקון '+wrong.length+'</div><div class="status-pill">💯 ציון נוכחי '+finalPercent()+' מתוך 100</div><div class="status-pill">💡 רמזים '+state.hintsUsed+'</div></div><div class="p-4 rounded-3xl bg-red-50 border-2 border-red-200 mb-5 text-center"><h3 class="text-2xl font-black text-red-800">כלל מחייב בשלב התיקון</h3><p class="font-black text-slate-800 mt-2">מותר לבחור תשובה אחת בלבד. אם הבחירה שגויה, הבחירה תסומן באדום והתשובה הנכונה תסומן בירוק.</p><p class="font-black text-slate-800 mt-2">שימוש ברמז מוריד 5 נקודות מהציון הסופי, והרמז יוצג בתוך התא לפני הבחירה.</p><div class="progress-track mt-3"><div class="progress-fill" style="width:'+progress+'%"></div></div><p class="font-black mt-2">התקדמות תיקון: '+completed+' מתוך '+wrong.length+'</p></div>'+(wrong.length===0?'<div class="p-6 rounded-3xl bg-green-50 border-2 border-green-200 text-center"><div class="text-5xl">🏆</div><h3 class="text-2xl font-black text-green-800 mt-2">אין טעויות לתיקון</h3><p class="font-bold text-slate-700 mt-2">אפשר לעבור ישירות להפקת תעודה.</p></div>':renderCorrectionMatrix(wrong))+'<div class="text-center mt-6 grid md:grid-cols-3 gap-3 no-print"><button onclick="showCorrectionAnalysis()" class="gold-btn p-4 rounded-3xl text-lg">ניתוח תיקון</button><button onclick="setScreen(\'analytics\')" class="blue-btn p-4 rounded-3xl text-lg">חזרה לניתוח</button><button onclick function renderCorrectionMatrix(wrong){const grouped={};wrong.forEach(item=>{const key=item.stage+"_"+item.root;if(!grouped[key])grouped[key]={stage:item.stage,root:item.root,items:[]};grouped[key].items.push(item);});let desktop="";Object.keys(grouped).forEach(key=>desktop+=renderCorrectionDesktopTable(grouped[key]));let mobile="";wrong.forEach(item=>mobile+=renderCorrectionItem(item));return '<div class="desktop-matrix overflow-x-auto">'+desktop+'</div><div class="mobile-matrix">'+mobile+'</div>';}

function correctionOptionsForItem(item){const optionsKey=correctionKey(item.key);if(!state.tempCorrectionOptions[optionsKey]){const rootObject=safeRootForms(item.rootObject||findRootByName(item.root),{fn:"correctionOptionsForItem",item});state.tempCorrectionOptions[optionsKey]=makeOptions(item.correct,rootObject);}return state.tempCorrectionOptions[optionsKey];}

function renderCorrectionItem(item){const existing=getCorrectionAnswer(item.key),hintShown=state.hintedKeys.includes(item.key),options=correctionOptionsForItem(item);let buttons="";options.forEach(opt=>{let cls="";if(existing){if(opt===item.correct)cls="correct locked";else if(opt===existing.selected)cls="wrong locked";else cls="locked";}buttons+='<button class="answer-btn '+cls+'" onclick="selectCorrectionAnswer(\''+jsArg(item.key)+'\',\''+jsArg(opt)+'\')">'+escapeHtml(opt)+'</button>';});return '<div class="rounded-3xl bg-slate-50 border p-4"><div class="grid md:grid-cols-5 gap-2 mb-3 text-center"><div class="status-pill">שלב '+item.stage+'</div><div class="status-pill">שורש '+escapeHtml(item.root)+'</div><div class="status-pill">גוף '+escapeHtml(item.pronoun)+'</div><div class="status-pill">זמן '+tenseMap[item.tense]+'</div><button onclick="showCorrectionHint(\''+jsArg(item.key)+'\')" class="gold-btn rounded-2xl px-3 '+(hintShown||existing?'locked':'')+'">רמז</button></div><div class="'+(hintShown?'':'hidden')+' p-3 rounded-2xl bg-yellow-50 border-2 border-yellow-200 font-black mb-3 text-slate-900">'+(hintShown?escapeHtml(grammarHint(item)):'')+'</div><div class="grid md:grid-cols-3 gap-2">'+buttons+'</div>'+(existing?'<div class="mt-3 p-3 rounded-2xl '+(existing.isCorrect?'bg-green-50 text-green-800':'bg-red-50 text-red-800')+' font-black text-center">'+(existing.isCorrect?'נכון. התא ננעל ואין ניסיון נוסף':'בחירה שגויה. התשובה הנכונה סומנה בירוק והתא ננעל')+'</div>':'')+'</div>';}
function showCorrectionHint(originalKey){const item=state.answers.find(a=>a.key===originalKey);if(!item)return;if(getCorrectionAnswer(originalKey)){alert("התא כבר ננעל לאחר בחירת תשובה. אין אפשרות לפתוח רמז לאחר בחירה.");return;}if(state.hintedKeys.includes(originalKey))return;if(!confirm("שימוש ברמז יוריד 5 נקודות מהציון הסופי. האם לאשר?"))return;state.hintsUsed++;state.hintPenalty+=5;state.hintedKeys.push(originalKey);renderCorrectionLab();}

function grammarHint(item){if(item.tense==="future"&&item.pronoun==="אני")return "בזמן עתיד גוף אני מקבל בדרך כלל א׳ בתחילת הפועל.";if(item.tense==="future"&&item.pronoun==="אנחנו")return "בזמן עתיד גוף אנחנו מקבל בדרך כלל נ׳ בתחילת הפועל.";if(item.tense==="future"&&["אתה","את","היא","אתם","אתן"].includes(item.pronoun))return "בזמן עתיד גופים אלה מתחילים בדרך כלל באות ת׳.";if(item.tense==="future"&&["הוא","הם","הן"].includes(item.pronoun))return "בזמן עתיד גוף הוא והם מתחילים בדרך כלל באות י׳.";if(item.tense==="past")return "בזמן עבר חפש את סיומת הגוף.";if(item.tense==="present")return "בזמן הווה בדוק אם הגוף זכר או נקבה, יחיד או רבים.";return "קרא את הגוף ואת הזמן ואז בדוק איזו תחילית או סיומת מתאימה.";}
